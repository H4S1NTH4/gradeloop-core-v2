services:
  # =============================================================================
  # Kong API Gateway (DB-less mode)
  # =============================================================================
  kong:
    image: kong:3.9
    container_name: kong-gateway
    restart: unless-stopped

    # Run Kong in DB-less mode using declarative configuration
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_LOG_LEVEL=info
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_GUI=off
      # JWT Plugin Configuration
      - KONG_PLUGINS=bundled,jwt,key-auth,rate-limiting,cors,request-size-limiting,request-transformer
      - KONG_JWT_SECRET=${JWT_SECRET_KEY}
      # Rate Limiting Configuration
      - KONG_RATE_LIMITING_DICT_SIZE=10000
      # Security Settings
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      # Timeout settings for production
      - KONG_PROXY_READ_TIMEOUT=60000
      - KONG_PROXY_WRITE_TIMEOUT=60000
      - KONG_PROXY_CONNECT_TIMEOUT=10000

    ports:
      # Public Proxy Port
      - "8000:8000"
      # Admin API (internal only - see networks configuration)
      - "127.0.0.1:8001:8001"
      # Status endpoint for health checks
      - "8100:8100"

    volumes:
      # Mount declarative configuration
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro

    networks:
      - gradeloop-network

    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    depends_on:
      iam-service:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # IAM Service (Go Fiber)
  # =============================================================================
  iam-service:
    build:
      context: ./apps/services/iam-service
      dockerfile: Dockerfile
    container_name: iam-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - SERVER_PORT=${IAM_SVC_PORT}
      - ENABLE_PREFORK=${IAM_SVC_ENABLE_PREFORK}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${IAM_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - EMAIL_SERVICE_URL=http://email-service:8082
      - FRONTEND_URL=${FRONTEND_URL}
      - SUPER_ADMIN_USERNAME=${SUPER_ADMIN_USERNAME}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY}

    expose:
      - "8081"

    networks:
      - gradeloop-network

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Email Service (dependency for IAM)
  # =============================================================================
  email-service:
    build:
      context: ./apps/services/email-service
      dockerfile: Dockerfile
    container_name: email-service
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - APP_PORT=${EMAIL_SVC_PORT}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${EMAIL_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - SMTP_PASSWORD=${SMTP_PASS}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

    expose:
      - "8082"

    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # RabbitMQ (Message Broker)
  # =============================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped

    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

    ports:
      - "5672:5672"
      - "15672:15672"

    networks:
      - gradeloop-network

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

# =============================================================================
# Networks Configuration
# =============================================================================
networks:
  gradeloop-network:
    driver: bridge
